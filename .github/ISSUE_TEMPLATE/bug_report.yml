name: Bug Report
description: Report a bug in Paper Workflow
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1. Run `/paper-search "..."`
        2. ...
        3. See error

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
