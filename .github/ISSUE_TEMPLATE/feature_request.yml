name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as specific as you can.

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this affect?
      options:
        - Search (arXiv, Semantic Scholar, new sources)
        - Ingest (PDF parsing, chunking, embedding)
        - Retrieval (vector search, FTS, ranking)
        - Analysis (single paper, comparison, synthesis)
        - Claude Code integration (skills, agents, rules)
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
